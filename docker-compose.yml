name: aether-sovereign-os

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      POSTGRES_DB: aether
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    # redis-stack-server bundles the RediSearch module needed for the
    # FT.CREATE / hybrid vector+tag+geo queries in app/search/redis_search.py.
    image: redis/redis-stack-server:7.4.0-v3
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD:-aether}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  elasticsearch:
    # Phase 3 prep only -- not on the active search path yet, see
    # apps/api/python/app/search/elasticsearch_setup.py.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  gateway:
    build: ./apps/gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aether:aether@postgres:5432/aether
      GATEWAY_BIND_ADDR: 0.0.0.0:8080
      ALLOWED_ORIGINS: http://localhost:5173
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:?set a real contact -- Nominatim blocks placeholder domains}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret}
      PYTHON_API_BASE_URL: http://python-api:8000
    ports:
      - "8080:8080"

  python-api:
    build: ./apps/api/python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://aether:aether@postgres:5432/aether
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_FAST_MODEL: ${OPENROUTER_FAST_MODEL:-anthropic/claude-3.5-haiku}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-openai/gpt-4o}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aether}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: aether_entities
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_GATEWAY_URL: /api
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "5173:80"

  airflow:
    # Standalone mode: single container running webserver + scheduler +
    # triggerer, backed by its own Postgres. Fine for local dev; split into
    # separate services before this goes anywhere near production.
    image: apache/airflow:3.0.0
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:?set a real contact -- Nominatim blocks placeholder domains}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      GATEWAY_DATABASE_URL: postgres://aether:aether@postgres:5432/aether
    volumes:
      - ./data/pipelines/dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    command: standalone

  airflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  es_data:
  airflow_postgres_data:
