name: aether-sovereign-os

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      POSTGRES_DB: aether
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    # redis-stack-server bundles the RediSearch module needed for the
    # FT.CREATE / hybrid vector+tag+geo queries in app/search/redis_search.py.
    image: redis/redis-stack-server:7.4.0-v3
    restart: unless-stopped
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD:-aether}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  elasticsearch:
    # Phase 3 prep only -- not on the active search path yet, see
    # apps/api/python/app/search/elasticsearch_setup.py.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kafka:
    # Phase 4 streaming. KRaft mode (no ZooKeeper -- removed in Kafka 4.x),
    # single combined broker+controller node -- fine for dev, not for HA.
    # Version/ports mirror what was actually run and verified natively in
    # this repo's dev sandbox (no Docker daemon there -- see CLAUDE.md);
    # this service definition itself has not been exercised via
    # `docker compose up` and should be smoke-tested before relying on it.
    image: apache/kafka:4.3.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.15
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8082
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "8082:8082"

  ksqldb:
    image: confluentinc/cp-ksqldb-server:7.5.15
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    environment:
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://schema-registry:8082
      # ksqlDB streams/tables default to auto.offset.reset=latest, which
      # silently skips historical topic data for any CTAS built after the
      # fact -- see streaming/README.md for the live repro of this from
      # the build sandbox. earliest matches what was verified to work.
      KSQL_KSQL_STREAMS_AUTO_OFFSET_RESET: earliest
      # ksqlDB 7.5.x predates the JDK SecurityManager removal; needed on
      # any Java 17+ base image the ksqlDB image ships with.
      KSQL_OPTS: -Djava.security.manager=allow
    ports:
      - "8088:8088"

  flink-jobmanager:
    image: flink:2.3.0
    restart: unless-stopped
    # cep_alerts.py (streaming/flink/) needs flink-sql-connector-kafka
    # and flink-sql-avro-confluent-registry on the classpath -- mount
    # them into lib/ here to match the native setup verified in
    # streaming/README.md, e.g.:
    #   volumes:
    #     - ./streaming/flink/jars:/opt/flink/lib/custom
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "8083:8081"

  flink-taskmanager:
    image: flink:2.3.0
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 1

  gateway:
    build: ./apps/gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aether:aether@postgres:5432/aether
      GATEWAY_BIND_ADDR: 0.0.0.0:8080
      ALLOWED_ORIGINS: http://localhost:5173
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:?set a real contact -- Nominatim blocks placeholder domains}
      JWT_SECRET: ${JWT_SECRET:?set a real random secret -- the previous default was a well-known string committed to this public repo, making tokens forgeable}
      PYTHON_API_BASE_URL: http://python-api:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8082
      KSQLDB_URL: http://ksqldb:8088
      FLINK_REST_URL: http://flink-jobmanager:8081
    ports:
      - "8080:8080"

  alert-dispatcher:
    # Task 28 -- bridges Flink's raw aether.detected_patterns to real
    # per-user rows in Postgres user_alerts (which /ws/alerts listens to
    # via LISTEN/NOTIFY) and to aether.user_alerts on Kafka. See
    # apps/api/python/app/streaming/producers/alert_dispatcher.py and
    # streaming/README.md for why this isn't done in ksqlDB or Flink
    # directly.
    build: ./apps/api/python
    restart: unless-stopped
    command: python -m app.streaming.producers.alert_dispatcher
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aether:aether@postgres:5432/aether
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8082

  python-api:
    build: ./apps/api/python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://aether:aether@postgres:5432/aether
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_FAST_MODEL: ${OPENROUTER_FAST_MODEL:-anthropic/claude-3.5-haiku}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-openai/gpt-4o}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      # Heirloom export/import (agent weight snapshots, AES-256-GCM) is
      # disabled with a clear error until this is set -- was previously
      # missing from this file entirely, so POST /heirlooms/{id}/export
      # 500'd with no indication why (confirmed live). Generate one with:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      HEIRLOOM_DEVICE_KEY: ${HEIRLOOM_DEVICE_KEY:-}
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aether}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: aether_entities
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8082
      KSQLDB_URL: http://ksqldb:8088
      FLINK_REST_URL: http://flink-jobmanager:8081
      # The Architect (Phase 5b) -- see ROADMAP.md "Phase 5b: the Architect"
      # and app/agent_swarm/introspection.py /
      # app/agent_swarm/services/architect_committer.py. JWT_SECRET must
      # match the gateway's (below) -- POST /architect/run verifies the
      # same token, itself, rather than trusting the gateway already did
      # (this route is also reachable unauthenticated via web's nginx
      # /py-api/ proxy, same as every other python-api route -- see
      # CLAUDE.md). GITHUB_TOKEN unset (default) means the architect can
      # still snapshot/plan, but the commit/PR step no-ops with a clear
      # logged reason instead of silently doing nothing.
      JWT_SECRET: ${JWT_SECRET:?set a real secret -- see apps/gateway/.env.example}
      PROJECT_ROOT: /repo
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-thetruezubzero-pixel/map}
      ARCHITECT_AUTO_COMMIT_ENABLED: ${ARCHITECT_AUTO_COMMIT_ENABLED:-true}
      # Phase 5c -- see ROADMAP.md "Phase 5c: widening
      # safe_to_autoimplement". Default off: the mechanism exists either
      # way, but auto-merge (vs. PR-only) needs an explicit opt-in.
      AGENT_AUTO_MERGE_ENABLED: ${AGENT_AUTO_MERGE_ENABLED:-false}
      AGENT_AUTO_MERGE_CONFIDENCE_THRESHOLD: ${AGENT_AUTO_MERGE_CONFIDENCE_THRESHOLD:-0.9}
      AGENT_AUTO_MERGE_MIN_TRACK_RECORD: ${AGENT_AUTO_MERGE_MIN_TRACK_RECORD:-10}
    volumes:
      # Dev-only: gives introspection.py real ROADMAP.md/DAG/git-log
      # access and gives architect_committer.py a real working tree to
      # branch/commit/push from. Read-write is required -- this is the
      # one place in the repo an app service can write to its own source
      # tree, scoped down in application code (architect_committer.py
      # only ever touches PROJECT_PLAN.md; see its module docstring for
      # the full guard chain) rather than at the mount level, since the
      # commit step also needs `git` to read .git/ objects it isn't
      # writing to directly.
      - .:/repo
    # No host port mapping: python-api has no authentication of its own
    # (see CLAUDE.md) -- it's reachable internally via the docker network
    # by both `gateway` (proxies /research) and `web`'s nginx (proxies
    # /py-api/ for graph+analytics), which is the only access it should
    # have. Audit finding: this was previously exposed as "8000:8000",
    # putting unauthenticated research-job creation and entity-resolution
    # review actions directly on the host's network.

  web:
    build:
      context: ./apps/web
      args:
        VITE_MAPBOX_ACCESS_TOKEN: ${VITE_MAPBOX_ACCESS_TOKEN:-}
        VITE_GATEWAY_URL: /api
        VITE_PY_API_URL: /py-api
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "5173:80"

  airflow:
    # Standalone mode: single container running webserver + scheduler +
    # triggerer, backed by its own Postgres. Fine for local dev; split into
    # separate services before this goes anywhere near production.
    image: apache/airflow:3.0.0
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:?set a real contact -- Nominatim blocks placeholder domains}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      GATEWAY_DATABASE_URL: postgres://aether:aether@postgres:5432/aether
    volumes:
      - ./data/pipelines/dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    command: standalone

  airflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  es_data:
  airflow_postgres_data:
  kafka_data:
