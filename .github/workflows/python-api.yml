name: Python API

on:
  push:
    branches: [ "main" ]
    paths: [ "apps/api/python/**", ".github/workflows/python-api.yml" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "apps/api/python/**", ".github/workflows/python-api.yml" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/python/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Test
        run: python -m pytest -q
