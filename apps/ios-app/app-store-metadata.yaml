# Description (max 170 characters for subtitle, 4000 for description)
subtitle_short: "Research businesses, properties & public records"
description: |
  Aether Sovereign OS is a research platform for public business, property, and
  location records — built for due diligence, journalism, and urban planning.

  ## Features
  - **Entity Search**: Search across OpenStreetMap, SEC EDGAR, OpenCorporates,
    Census data, and more
  - **Live Mapping**: Interactive map with layers for businesses, properties,
    news, and boundaries
  - **Multi-Agent Research**: AI-powered research pipeline with consensus voting
    and credit assignment
  - **Real-Time Alerts**: WebSocket-based live alert subscriptions by entity,
    keyword, or geofence
  - **Entity Resolution**: Intelligent deduplication and relationship mapping
  - **Entity Graphs**: Visualize parent/subsidiary relationships and entity networks

  ## Data Sources (All Public, Licensed)
  - OpenStreetMap (ODbL)
  - SEC EDGAR (Public Domain)
  - OpenCorporates (CC-BY)
  - NewsAPI / GDELT (CC-BY-NC)
  - Census TIGER (Public Domain)
  - USGS (Public Domain)
  - FCC License Records (Public Domain)
  - Zoning & Property Boundaries (Various)

  ## Scope
  This app researches PUBLIC records only:
  ✓ Businesses and corporate filings
  ✓ Properties and locations
  ✓ Government records
  ✓ News and public data

  ✗ No personal data collection
  ✗ No device tracking
  ✗ No individual dossiers

  ## Privacy & Security
  - JWT-based authentication
  - All API calls encrypted in transit (TLS)
  - No personal information stored on device
  - Location used only for map context (not tracked)
  - Read-only access to research data

  For detailed information, see: https://github.com/thetruezubzero-pixel/map

