server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://gateway:8080/;
        # Needed for GET /ws/alerts -- without an explicit Upgrade/Connection
        # pass-through, nginx proxies WebSocket upgrade requests as plain
        # HTTP and the handshake fails.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /py-api/ {
        proxy_pass http://python-api:8000/;
    }

    location / {
        try_files $uri /index.html;
    }
}
