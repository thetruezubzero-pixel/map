# A readiness review found POST /chat (app/routers/chat.py) reachable
# through the /py-api/ proxy below with no throttle at all -- unlike every
# gateway route, this endpoint has zero rate limiting anywhere in front of
# it, and every call triggers a real, billed OpenRouter completion
# (app/agents/chat_agent.py). Scoped to this one location (see below) so
# no other python-api route's behavior changes; per-IP is the only
# granularity available since this endpoint has no auth/user concept.
limit_req_zone $binary_remote_addr zone=chat_zone:10m rate=6r/m;

# Same bug class as chat above, found on POST /research: create_job
# (app/routers/research.py) returns immediately after enqueuing
# run_research_job as a BackgroundTask, and that task runs the full
# multi-agent swarm -- multiple real, billed OpenRouter completions per
# job (app/orchestrator.py). The frontend creates jobs through the gateway
# (/api/research, behind rate_limit.rs), but POST /py-api/research reaches
# create_job DIRECTLY through the regex catch-all below, bypassing the
# gateway with no auth and no throttle -- so an anonymous loop enqueues
# unbounded paid work. Worse than chat, since fire-and-forget removes even
# the natural backpressure a synchronous reply gives. Stricter rate than
# chat because each job fans out into several model calls, not one.
limit_req_zone $binary_remote_addr zone=research_zone:10m rate=3r/m;

# POST /architect/run (app/routers/architect.py) is JWT-gated in the app
# (app/auth.py), so unlike chat/research it is NOT an anonymous vector --
# but it has the same timeout mismatch chat had. It makes a real
# OpenRouter plan call (openrouter_client.complete: 30s x stop_after_
# attempt(2) + backoff per model, across primary + fallbacks -- a ~128s
# worst case) and THEN does git fetch/checkout/commit/push + a PR-create
# API call. runArchitectCycle (apps/web/src/lib/api.ts) reaches it through
# the /py-api/ catch-all below on nginx's default 60s proxy_read_timeout,
# so a slow-but-succeeding cycle gets cut at 60s -- surfacing a 504 to the
# client while the commit/PR may still complete server-side, tempting a
# re-run that opens a duplicate PR. Own zone (low rate; runs are rare and
# heavy) plus a timeout sized above the real worst case.
limit_req_zone $binary_remote_addr zone=architect_zone:10m rate=2r/m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS -- without this, nginx resolves upstream
    # hostnames once at worker startup and caches the IP for the
    # container's lifetime. If gateway/python-api restart (crash, deploy,
    # scale) and get a new IP, every proxied request 502s until web is
    # also restarted. Using a variable in proxy_pass forces nginx to
    # re-resolve through this resolver instead of caching indefinitely.
    resolver 127.0.0.11 valid=10s;

    # A variable in proxy_pass (needed above for the resolver to actually
    # re-resolve) disables nginx's normal automatic prefix-stripping, so
    # a plain `location /api/ { proxy_pass http://$var/; }` forwards the
    # *unstripped* path (e.g. "/api/health") to the upstream instead of
    # "/health" -- confirmed live as a 404 from gateway on every request.
    # Capturing the remainder via regex and rebuilding the path
    # explicitly (the standard fix for this combination) avoids it.
    location ~ ^/api/(.*)$ {
        set $gateway_upstream gateway:8080;
        proxy_pass http://$gateway_upstream/$1$is_args$args;
        # Needed for GET /ws/alerts -- without an explicit Upgrade/Connection
        # pass-through, nginx proxies WebSocket upgrade requests as plain
        # HTTP and the handshake fails.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Exact-match location, checked by nginx ahead of the regex location
    # below regardless of declaration order -- a readiness review found two
    # gaps specific to this one route: (1) chat_agent.py's
    # openrouter_client.complete() retries up to 2 candidate models
    # (fast + fallback), each up to 2 attempts x 30s + backoff, a genuine
    # ~128s worst case before it ever reaches its own graceful fallback
    # text -- nginx's default 60s proxy_read_timeout cut that connection
    # first, surfacing a bare 504 instead of the intended degraded reply;
    # (2) no rate limiting at all (see limit_req_zone above).
    location = /py-api/chat {
        set $python_api_upstream python-api:8000;
        proxy_pass http://$python_api_upstream/chat$is_args$args;
        proxy_read_timeout 150s;
        limit_req zone=chat_zone burst=3 nodelay;
    }

    # Exact-match (checked ahead of the regex catch-all below regardless
    # of declaration order), so it throttles ONLY the expensive create
    # endpoint -- POST /py-api/research. The cheap DB-read sub-paths the
    # frontend polls frequently (/py-api/research/{id},
    # /py-api/research/{id}/trace) carry a sub-path, don't match this exact
    # location, and fall through to the catch-all unthrottled as before.
    # See the research_zone comment above for why this route needs it.
    location = /py-api/research {
        set $python_api_upstream python-api:8000;
        proxy_pass http://$python_api_upstream/research$is_args$args;
        limit_req zone=research_zone burst=2 nodelay;
    }

    # See architect_zone comment above -- longer timeout is the primary fix
    # (the OpenRouter + git + PR pipeline can outlast the default 60s); the
    # limit_req is defense-in-depth on top of the app's JWT gate.
    location = /py-api/architect/run {
        set $python_api_upstream python-api:8000;
        proxy_pass http://$python_api_upstream/architect/run$is_args$args;
        proxy_read_timeout 180s;
        limit_req zone=architect_zone burst=1 nodelay;
    }

    # Catch-all for remaining python-api routes (mostly read-only, no throttle).
    # Routes above (chat, research create, architect/run) have exact-match
    # locations that are checked first and intercepted by nginx. Everything
    # else falls through here. The distinction:
    #
    # COST-BEARING routes (require exact-match locations + rate limits):
    # - POST /py-api/research: fire-and-forget job enqueuing → multi-agent
    #   swarm → multiple billed OpenRouter calls (need throttle, own limit_req)
    # - POST /py-api/chat: synchronous OpenRouter completion request
    #   (need throttle, own limit_req)
    # - POST /py-api/architect/run: OpenRouter plan + git ops + PR creation
    #   (JWT-gated at app level, but need timeout + defense-in-depth throttle)
    #
    # CHEAP-READ routes (unthrottled here, OK to fall through):
    # - GET /py-api/research/{id}: DB lookup of a single job's status
    # - GET /py-api/research/{id}/trace: DB join of job's decision chain
    # - GET /py-api/graph/*: Entity/relationship queries (read-only, indexed)
    # - GET /py-api/analytics/*: Aggregation queries (read-only, indexed)
    # - GET /py-api/swarm*: Agent activity queries (read-only, indexed)
    #
    # The unthrottled routes are genuinely read-only and cheap (sub-100ms on
    # normal DB loads). If a future route with real cost is added, it should
    # get its own exact-match location above, not fall through here.
    location ~ ^/py-api/(.*)$ {
        set $python_api_upstream python-api:8000;
        proxy_pass http://$python_api_upstream/$1$is_args$args;
    }

    location / {
        try_files $uri /index.html;
    }
}
